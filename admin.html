<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>菜々カレンダー管理</title>
  <meta name="description" content="菜々カレンダー管理（ローカル保存 / 基本休み＋例外＋メモ）" />

  <style>
    :root{
      --bg0:#fbfaf7;
      --bg1:#f3efe7;
      --paper:#ffffff;
      --paper2:#fffdf8;

      --ink:#1b1b1b;
      --muted:rgba(0,0,0,.62);
      --line:rgba(0,0,0,.12);

      /* 状態文字色（好みで変更OK） */
      --stateOpen:#2f6bff; /* 営業 */
      --stateOff:#d24a4a;  /* 休み */

      --chipBg: rgba(0,0,0,.04);
      --chipBd: rgba(0,0,0,.12);

      --r:16px;

      /* ベース（PC/タブレット） */
      --gap:6px;
      --cellPadX:6px;
      --cellPadT:7px;
      --cellPadB:7px;

      /* ボタン（枠なし / 縦3段） */
      --btnFont: 12px;
      --btnPadY: 7px;
      --btnPadX: 10px; /* ←スマホでさらに詰める */
      --btnRadius: 12px;

      --btnOffBg: rgba(210,74,74,.10);
      --btnOffBgOn: rgba(210,74,74,.24);

      --btnOpenBg: rgba(47,107,255,.10);
      --btnOpenBgOn: rgba(47,107,255,.24);

      --btnMemoBg: rgba(184,134,42,.10);
      --btnMemoBgOn: rgba(184,134,42,.24);

      --btnText: rgba(0,0,0,.86);
      --btnTextOn: rgba(0,0,0,.92);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,"Noto Sans JP",sans-serif;
      color:var(--ink);
      min-height:100svh;
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.92), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 88% 18%, rgba(255,255,255,.80), rgba(255,255,255,0) 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    .wrap{ max-width:980px; margin:0 auto; padding:12px 10px 34px; }
    .title{ font-size:18px; font-weight:1000; letter-spacing:.02em; }
    .sub{ color:var(--muted); font-size:12px; margin-top:6px; line-height:1.75; }

    .panel{
      background: linear-gradient(180deg, var(--paper), var(--paper2));
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:12px;
      margin-top:10px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      border-radius:12px;
      padding:9px 11px;
      font-weight:1000;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 0 rgba(0,0,0,.04);
    }
    button.primary{
      border-color: rgba(47,107,255,.35);
      box-shadow: 0 0 0 2px rgba(47,107,255,.10) inset, 0 1px 0 rgba(0,0,0,.04);
    }
    button.good{
      border-color: rgba(31,143,82,.35);
      box-shadow: 0 0 0 2px rgba(31,143,82,.10) inset, 0 1px 0 rgba(0,0,0,.04);
    }
    button.danger{
      border-color: rgba(210,74,74,.40);
      box-shadow: 0 0 0 2px rgba(210,74,74,.10) inset, 0 1px 0 rgba(0,0,0,.04);
    }

    .ym{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .ym h2{ margin:0; font-size:18px; font-weight:1000; letter-spacing:.02em; }

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      margin-top:10px;
      color:rgba(0,0,0,.55);
      font-weight:1000;
      font-size:12px;
    }
    .dow div{ text-align:center; }

    .grid{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
    }

    .cell{
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding: var(--cellPadT) var(--cellPadX) var(--cellPadB);
      min-height: 92px;
      overflow: visible;
      display:flex;
      flex-direction:column;
      gap: 6px;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    .cell.blank{
      opacity:.35;
      background: rgba(255,255,255,.65);
      box-shadow:none;
    }

    .topline{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:6px;
    }
    .daynum{
      font-size:14px;
      font-weight:1000;
      line-height:1.05;
      white-space:nowrap;
    }
    .chipBase{
      font-size:9.5px;
      font-weight:1000;
      padding:3px 7px;
      border-radius:999px;
      border:1px solid var(--chipBd);
      background: var(--chipBg);
      color: rgba(0,0,0,.72);
      white-space:nowrap;
    }
    .chipBase.off{ border-color:rgba(210,74,74,.22); color:rgba(210,74,74,.92); background: rgba(210,74,74,.06); }
    .chipBase.on{  border-color:rgba(31,143,82,.20); color:rgba(31,143,82,.95); background: rgba(31,143,82,.06); }

    /* 日付の下：営業/休み */
    .stateLine{
      font-size:12px;
      font-weight:1000;
      line-height:1.25;
      margin-top: 1px;
    }
    .stateLine.open{ color: var(--stateOpen); }
    .stateLine.off{  color: var(--stateOff); }

    .mini{
      font-size:11px;
      font-weight:900;
      color: rgba(0,0,0,.72);
      background: rgba(0,0,0,.03);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 10px;
      padding: 5px 8px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    /* ✅ ボタン：縦3段（枠なし） */
    .badges{
      margin-top:auto;
      display:flex;
      flex-direction:column;
      gap: 6px;
      align-items:stretch;
    }

    .badge{
      border: 0;                 /* 枠なし */
      border-radius: var(--btnRadius);
      padding: var(--btnPadY) var(--btnPadX);
      font-size: var(--btnFont);
      font-weight: 1000;
      text-align:center;
      line-height:1.05;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      color: var(--btnText);
      white-space: pre-line;
      word-break: keep-all;
    }
    .badge:active{ filter: brightness(.95); }

    .badge.off{  background: var(--btnOffBg); }
    .badge.open{ background: var(--btnOpenBg); }
    .badge.memo{ background: var(--btnMemoBg); }

    .badge.on{ color: var(--btnTextOn); }
    .badge.off.on{  background: var(--btnOffBgOn); }
    .badge.open.on{ background: var(--btnOpenBgOn); }
    .badge.memo.on{ background: var(--btnMemoBgOn); }

    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:10px;
      line-height:1.75;
    }

    textarea#out{
      width:100%;
      min-height:220px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Noto Sans Mono", monospace;
      font-size:12px;
      line-height:1.5;
      margin-top:10px;
      white-space:pre;
    }

    dialog{
      width:min(560px, calc(100% - 24px));
      border:1px solid rgba(0,0,0,.14);
      background: rgba(255,255,255,.96);
      color: var(--ink);
      border-radius: 16px;
      padding: 0;
      overflow:hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.18);
    }
    dialog::backdrop{ background: rgba(0,0,0,.28); }
    .dlgHead{
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(0,0,0,.10);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .dlgTitle{ font-weight:1000; font-size:14px; letter-spacing:.02em; }
    .dlgBody{ padding: 12px 14px 14px; }
    .dlgBody label{
      display:block;
      font-size:12px;
      color: rgba(0,0,0,.65);
      margin-bottom: 6px;
      font-weight:1000;
    }
    .dlgBody textarea{
      width:100%;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.14);
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      min-height: 120px;
      white-space: pre-wrap;
    }
    .dlgFoot{
      padding: 12px 14px 14px;
      display:flex;
      gap:10px;
      justify-content:flex-end;
      border-top: 1px solid rgba(0,0,0,.10);
    }

    .toast{
      position:fixed;
      left:12px; right:12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.12);
      border-radius:14px;
      padding:12px 12px;
      font-weight:1000;
      opacity:0;
      transform: translateY(10px);
      transition:.18s ease;
      pointer-events:none;
      max-width: 980px;
      margin: 0 auto;
      color: rgba(0,0,0,.85);
      box-shadow: 0 14px 38px rgba(0,0,0,.14);
    }
    .toast.on{ opacity:1; transform:none; }

    /* =========================================================
       ✅ スマホ最適化（縮小しなくても 7列が入るようにさらに詰める）
       - gapを縮める
       - セルの左右paddingを縮める
       - チップ/文字を微調整
       - ボタン左右余白を詰める
    ========================================================= */
    @media (max-width: 560px){
      :root{
        --gap:4px;        /* ✅ 6 → 4 */
        --cellPadX:4px;   /* ✅ 6 → 4 */
        --cellPadT:6px;
        --cellPadB:6px;

        --btnPadX:7px;    /* ✅ ボタン左右余白を詰める */
        --btnPadY:6.5px;
        --btnFont:11.5px;
      }
      .wrap{ padding:10px 8px 28px; }
      .panel{ padding:10px; }
      .dow{ gap: var(--gap); font-size:11px; }
      .grid{ gap: var(--gap); }

      .cell{ border-radius:12px; min-height: 88px; gap: 5px; }
      .daynum{ font-size:13px; }
      .chipBase{ font-size:9px; padding:2.5px 6px; }
      .stateLine{ font-size:11.5px; }
      .badges{ gap: 5px; }
    }

    @media (max-width: 420px){
      :root{
        --gap:3px;        /* ✅ さらに詰める */
        --cellPadX:3px;
        --btnPadX:6px;
        --btnFont:11px;
      }
      .wrap{ padding:10px 6px 26px; }
      .panel{ padding:9px; }
      .cell{ min-height: 86px; }
    }
  </style>
</head>

<body>
<main class="wrap">
  <div class="title">菜々カレンダー管理</div>
  <div class="sub">
    ✅ 基本は <b>毎週水曜</b>＋<b>第2・第3木曜</b> が休み（自動）<br>
    ✅ 例外で上書き：<b>休み</b>／<b>営業</b>（基本休み解除）<br>
    ✅ メモ：表示ページに短文表示（改行OK）
  </div>

  <section class="panel">
    <div class="ym">
      <div class="row">
        <button id="prevBtn" type="button">← 前月</button>
        <button id="todayBtn" type="button" class="primary">今月</button>
        <button id="nextBtn" type="button">次月 →</button>
      </div>
      <h2 id="ymTitle">----</h2>
    </div>

    <div class="dow">
      <div style="color:var(--stateOff);">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div style="color:var(--stateOpen);">土</div>
    </div>
    <div class="grid" id="grid"></div>

    <div class="hint">
      ・「休み」：その日を休みにします（基本営業日でも休み）<br>
      ・「営業」：基本休みの日でも営業に戻します（基本休み解除）<br>
      ・「メモ」：表示ページに短文表示（改行OK）
    </div>
  </section>

  <section class="panel">
    <div class="row" style="justify-content:space-between;">
      <div class="row">
        <button id="exportBtn" type="button" class="good">JSONを書き出し（バックアップ）</button>
        <button id="copyBtn" type="button">コピー</button>
      </div>
      <div class="row">
        <button id="clearBtn" type="button" class="danger">この端末の設定を全削除</button>
      </div>
    </div>
    <textarea id="out" spellcheck="false" placeholder="ここにJSONが出ます（バックアップ用）。普段は不要です。"></textarea>
    <div class="hint">
      ※保存先は <b>この端末内（localStorage）</b> です。<br>
      ※別端末にも移したい時だけ、JSONをコピーして手動移行できます。
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <dialog id="memoDlg">
    <div class="dlgHead">
      <div class="dlgTitle" id="memoDlgTitle">メモ</div>
      <button type="button" id="memoCloseBtn" aria-label="閉じる">✕</button>
    </div>
    <div class="dlgBody">
      <label for="memoText">この日のメモ（表示ページに出す短文）</label>
      <textarea id="memoText" placeholder="例：早仕舞い18:00 / イベント出店 など" spellcheck="false"></textarea>
      <div class="hint" style="margin-top:8px;">
        ※空にして保存するとメモは削除されます。
      </div>
    </div>
    <div class="dlgFoot">
      <button type="button" id="memoDeleteBtn" class="danger">削除</button>
      <button type="button" id="memoSaveBtn" class="good">保存</button>
    </div>
  </dialog>
</main>

<script>
(() => {
  "use strict";

  const STORE_KEY = "nana_calendar_admin_v2_local";
  const $ = (s, el=document) => el.querySelector(s);

  const gridEl = $("#grid");
  const ymTitleEl = $("#ymTitle");
  const outEl = $("#out");
  const toastEl = $("#toast");

  const memoDlg = $("#memoDlg");
  const memoDlgTitle = $("#memoDlgTitle");
  const memoText = $("#memoText");
  const memoCloseBtn = $("#memoCloseBtn");
  const memoSaveBtn = $("#memoSaveBtn");
  const memoDeleteBtn = $("#memoDeleteBtn");

  let toastT=null;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("on");
    clearTimeout(toastT);
    toastT = setTimeout(()=>toastEl.classList.remove("on"), 1200);
  }

  let view = (() => {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth()+1 };
  })();

  // { "YYYY-MM": { off:[], open:[], memo:{} } }
  let OV = loadOV();

  function loadOV(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(!raw) return {};
      const obj = JSON.parse(raw);
      return (obj && typeof obj === "object") ? obj : {};
    }catch(e){ return {}; }
  }
  function saveOV(){ localStorage.setItem(STORE_KEY, JSON.stringify(OV)); }

  function pad2(n){ return String(n).padStart(2,"0"); }
  function ymKey(y,m){ return `${y}-${pad2(m)}`; }
  function ymd(y,m,d){ return `${y}-${pad2(m)}-${pad2(d)}`; }
  function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
  function firstDow(y,m){ return new Date(y, m-1, 1).getDay(); }

  function monthObj(y,m){
    const key = ymKey(y,m);
    if(!OV[key]) OV[key] = { off: [], open: [], memo: {} };

    const mo = OV[key];
    mo.off  = Array.isArray(mo.off)  ? mo.off  : [];
    mo.open = Array.isArray(mo.open) ? mo.open : [];
    mo.memo = (mo.memo && typeof mo.memo==="object") ? mo.memo : {};
    return mo;
  }

  function isBaseOff(y,m,d){
    const dt = new Date(y, m-1, d);
    const dow = dt.getDay();
    if(dow === 3) return true;
    if(dow === 4){
      let count = 0;
      for(let i=1;i<=d;i++){
        if(new Date(y, m-1, i).getDay() === 4) count++;
      }
      return (count===2 || count===3);
    }
    return false;
  }

  function calcOpenState(y,m,d){
    const mo = monthObj(y,m);
    const dateStr = ymd(y,m,d);
    const baseOff = isBaseOff(y,m,d);
    const forcedOpen = mo.open.includes(dateStr);
    const forcedOff  = mo.off.includes(dateStr);

    let isOff = baseOff && !forcedOpen;
    if(forcedOff) isOff = true;

    return { baseOff, forcedOpen, forcedOff, isOff };
  }

  function toggleOff(y,m,d){
    const mo = monthObj(y,m);
    const dateStr = ymd(y,m,d);

    const idx = mo.off.indexOf(dateStr);
    if(idx >= 0){
      mo.off.splice(idx,1);
      toast(`${dateStr}：休み OFF`);
    }else{
      mo.off.push(dateStr);
      const j = mo.open.indexOf(dateStr);
      if(j >= 0) mo.open.splice(j,1);
      toast(`${dateStr}：休み ON`);
    }
    saveOV();
    render();
  }

  function toggleOpen(y,m,d){
    const mo = monthObj(y,m);
    const dateStr = ymd(y,m,d);

    const idx = mo.open.indexOf(dateStr);
    if(idx >= 0){
      mo.open.splice(idx,1);
      toast(`${dateStr}：営業 OFF`);
    }else{
      mo.open.push(dateStr);
      const j = mo.off.indexOf(dateStr);
      if(j >= 0) mo.off.splice(j,1);
      toast(`${dateStr}：営業 ON`);
    }
    saveOV();
    render();
  }

  let editing = null;
  function openMemoDlg(y,m,d){
    const mo = monthObj(y,m);
    const dateStr = ymd(y,m,d);
    editing = { y,m,d,dateStr };

    memoDlgTitle.textContent = `${dateStr} のメモ`;
    memoText.value = (mo.memo && mo.memo[dateStr]) ? String(mo.memo[dateStr]) : "";

    memoDlg.showModal();
    memoText.focus();
  }
  function saveMemo(){
    if(!editing) return;
    const {y,m,dateStr} = editing;
    const mo = monthObj(y,m);
    const v = (memoText.value || "").trim();

    if(v){
      mo.memo[dateStr] = v;
      toast(`${dateStr}：メモ保存`);
    }else{
      delete mo.memo[dateStr];
      toast(`${dateStr}：メモ削除`);
    }
    saveOV();
    memoDlg.close();
    render();
  }
  function deleteMemo(){
    if(!editing) return;
    const {y,m,dateStr} = editing;
    const mo = monthObj(y,m);
    delete mo.memo[dateStr];
    saveOV();
    toast(`${dateStr}：メモ削除`);
    memoDlg.close();
    render();
  }

  memoCloseBtn.addEventListener("click", ()=>memoDlg.close());
  memoSaveBtn.addEventListener("click", saveMemo);
  memoDeleteBtn.addEventListener("click", deleteMemo);

  function render(){
    const {y,m} = view;
    const key = ymKey(y,m);
    ymTitleEl.textContent = key;
    gridEl.innerHTML = "";

    const start = firstDow(y,m);
    const last = daysInMonth(y,m);
    const mo = monthObj(y,m);

    for(let i=0;i<start;i++){
      const b = document.createElement("div");
      b.className = "cell blank";
      gridEl.appendChild(b);
    }

    for(let d=1; d<=last; d++){
      const dateStr = ymd(y,m,d);
      const { baseOff, forcedOpen, forcedOff, isOff } = calcOpenState(y,m,d);
      const hasMemo = !!(mo.memo && mo.memo[dateStr] && String(mo.memo[dateStr]).trim());

      const cell = document.createElement("div");
      cell.className = "cell";

      const top = document.createElement("div");
      top.className = "topline";

      const n = document.createElement("div");
      n.className = "daynum";
      n.textContent = d;
      top.appendChild(n);

      const chip = document.createElement("div");
      chip.className = "chipBase " + (baseOff ? "off" : "on");
      chip.textContent = baseOff ? "基本：休" : "基本：営";
      top.appendChild(chip);

      cell.appendChild(top);

      const st = document.createElement("div");
      st.className = "stateLine " + (isOff ? "off" : "open");
      st.textContent = isOff ? "休み" : "営業";
      cell.appendChild(st);

      if(hasMemo){
        const memoLine = document.createElement("div");
        memoLine.className = "mini";
        const v = String(mo.memo[dateStr]).replace(/\s+/g, " ").trim();
        memoLine.textContent = v.length > 18 ? (v.slice(0,18) + "…") : v;
        cell.appendChild(memoLine);
      }

      const badges = document.createElement("div");
      badges.className = "badges";

      const bOff = document.createElement("div");
      bOff.className = "badge off" + (forcedOff ? " on" : "");
      bOff.textContent = "休み";
      bOff.addEventListener("click", () => toggleOff(y,m,d));
      badges.appendChild(bOff);

      const bOpen = document.createElement("div");
      bOpen.className = "badge open" + (forcedOpen ? " on" : "");
      bOpen.textContent = "営業";
      bOpen.addEventListener("click", () => toggleOpen(y,m,d));
      badges.appendChild(bOpen);

      const bMemo = document.createElement("div");
      bMemo.className = "badge memo" + (hasMemo ? " on" : "");
      bMemo.textContent = "メモ";
      bMemo.addEventListener("click", () => openMemoDlg(y,m,d));
      badges.appendChild(bMemo);

      cell.appendChild(badges);
      gridEl.appendChild(cell);
    }

    const total = gridEl.children.length;
    const mod = total % 7;
    if(mod !== 0){
      for(let i=0;i<7-mod;i++){
        const b = document.createElement("div");
        b.className = "cell blank";
        gridEl.appendChild(b);
      }
    }
  }

  function addMonth(delta){
    let y=view.y, m=view.m + delta;
    while(m<=0){ m+=12; y--; }
    while(m>=13){ m-=12; y++; }
    view = { y, m };
    render();
  }

  function exportJSON(){
    const out = { overrides: {} };
    const keys = Object.keys(OV).sort();
    for(const key of keys){
      const mo = OV[key];
      if(!mo) continue;

      const off  = Array.isArray(mo.off)  ? mo.off.slice()  : [];
      const open = Array.isArray(mo.open) ? mo.open.slice() : [];
      const memo = (mo.memo && typeof mo.memo==="object") ? mo.memo : {};

      if(off.length===0 && open.length===0 && Object.keys(memo).length===0) continue;

      out.overrides[key] = { off, open, memo, tags:{} };
    }

    outEl.value = JSON.stringify(out, null, 2);
    toast("JSONを書き出し（バックアップ）");
  }

  $("#prevBtn").addEventListener("click", () => addMonth(-1));
  $("#nextBtn").addEventListener("click", () => addMonth(1));
  $("#todayBtn").addEventListener("click", () => {
    const d = new Date();
    view = { y:d.getFullYear(), m:d.getMonth()+1 };
    render();
  });

  $("#exportBtn").addEventListener("click", exportJSON);

  $("#copyBtn").addEventListener("click", async () => {
    if(!outEl.value.trim()) exportJSON();
    try{
      await navigator.clipboard.writeText(outEl.value);
      toast("コピーしました");
    }catch(e){
      outEl.focus(); outEl.select();
      toast("手動でコピーしてください");
    }
  });

  $("#clearBtn").addEventListener("click", () => {
    localStorage.removeItem(STORE_KEY);
    OV = loadOV();
    outEl.value = "";
    toast("この端末の設定を削除しました");
    render();
  });

  render();
})();
</script>
</body>
</html>
